<div class="h-full bg-black! border-r border-gray-900 flex flex-col">
  <div class="p-6 border-b border-gray-900 flex items-center gap-3">
    <mat-icon class="text-pastel-pink! scale-150">pets</mat-icon>
    <span class="text-2xl font-bold text-white! tracking-tight translate-y-0.5">Cica Menhely</span>
  </div>

  <mat-nav-list class="flex-1 px-4 py-4 space-y-1">
    <a mat-list-item routerLink="/cats" 
       routerLinkActive="active-link text-pastel-pink! bg-white/5" 
       class="flex items-center gap-4 py-4 transition-all duration-200 border-transparent pl-8 group hover:bg-white/5 mx-4! rounded-[4px]!">
      <mat-icon matListItemIcon class="text-gray-400! group-hover:text-pastel-pink! group-[.active-link]:text-pastel-pink! transition-colors scale-110!">dashboard</mat-icon>
      <span matListItemTitle class="font-semibold text-gray-300! group-hover:text-white! group-[.active-link]:text-pastel-pink! transition-colors">Macskák</span>
    </a>

    <a mat-list-item routerLink="/people" 
       routerLinkActive="active-link text-pastel-pink! bg-white/5" 
       class="flex items-center gap-4 py-4 transition-all duration-200 border-transparent pl-8 group hover:bg-white/5 mx-4! rounded-[4px]!">
      <mat-icon matListItemIcon class="text-gray-400! group-hover:text-pastel-pink! group-[.active-link]:text-pastel-pink! transition-colors scale-110!">people</mat-icon>
      <span matListItemTitle class="font-semibold text-gray-300! group-hover:text-white! group-[.active-link]:text-pastel-pink! transition-colors">Személyek</span>
    </a>

  </mat-nav-list>

  <div class="p-4 border-t border-gray-900">
    <div (click)="openProfile()" 
         class="bg-gray-900 p-3 flex items-center gap-3 rounded-[4px] cursor-pointer hover:bg-gray-800 transition-colors group/user">
      <div class="w-8 h-8 bg-pastel-pink flex items-center justify-center text-black font-bold text-xs rounded-[4px] group-hover/user:scale-110 transition-transform">
        {{ authService.currentUser()?.username?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="flex-1 overflow-hidden">
        <p class="text-xs font-bold text-white! truncate group-hover/user:text-pastel-pink transition-colors">{{ authService.currentUser()?.username }}</p>
      </div>
    </div>
    <button (click)="authService.logout()" 
            class="w-full flex items-center justify-center gap-2 py-3 text-red-500 hover:bg-red-500/10 transition-colors rounded-[4px] text-xs font-bold uppercase tracking-widest border border-red-500/20 shadow-none! bg-transparent! mt-3">
      <mat-icon class="scale-75">logout</mat-icon>
      Kijelentkezés
    </button>
  </div>
</div>
