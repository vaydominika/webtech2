<div class="h-full bg-black! border-r border-gray-900 flex flex-col">

    <span class="text-2xl font-bold text-white! tracking-tight translate-y-0.5">Cica Menhely</span>
  </div>

  <mat-nav-list class="flex-1 px-4 py-4 space-y-1">

       class="flex items-center gap-4 py-4 transition-all duration-200 border-transparent pl-8 group hover:bg-white/5 mx-4! rounded-[4px]!">

  <div class="p-4 border-t border-gray-900">

        <p class="text-[10px] font-bold text-white! truncate">Admin Vezérlő</p>
