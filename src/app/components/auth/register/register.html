<div class="min-h-screen w-full flex items-center justify-center bg-gray-50 p-6">
  <mat-card class="w-full max-w-[440px] bg-white! border-none shadow-2xl! p-12 rounded-[8px]! overflow-hidden relative">
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-pastel-pink/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-black/5 rounded-full blur-3xl"></div>

    <div class="relative">
      <div class="flex flex-col items-center mb-12">
        <div class="w-20 h-20 bg-black! flex items-center justify-center rounded-[4px]! mb-6 shadow-xl shadow-black/10">
          <mat-icon class="text-pastel-pink! scale-[2]">person_add</mat-icon>
        </div>
        <h1 class="text-3xl font-black text-black! tracking-tighter uppercase mb-2">Regisztráció</h1>
        <p class="text-gray-400 text-sm font-medium">Hozz létre egy új fiókot</p>
      </div>

      <form (ngSubmit)="register()" class="space-y-6">
        <div class="space-y-1">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 ml-1">Felhasználónév</label>
          <div class="relative">
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 scale-75">person</mat-icon>
            <input 
              name="username" 
              [(ngModel)]="userData.username" 
              required
              class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 text-sm focus:outline-none focus:ring-1 focus:ring-black transition-all font-semibold rounded-[4px]"
              placeholder="Válassz nevet">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 ml-1">Jelszó</label>
          <div class="relative">
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 scale-75">lock</mat-icon>
            <input 
              type="password" 
              name="password" 
              [(ngModel)]="userData.password" 
              required
              class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 text-sm focus:outline-none focus:ring-1 focus:ring-black transition-all font-semibold rounded-[4px]"
              placeholder="Min. 6 karakter">
          </div>
        </div>

        <button mat-flat-button 
                type="submit"
                class="w-full py-8! bg-black! text-white! hover:bg-pastel-pink! hover:text-black! transition-all duration-300 rounded-[4px]! mt-4">
          <span class="text-sm font-black uppercase tracking-widest">Fiók létrehozása</span>
        </button>

        <div class="text-center pt-6">
          <p class="text-xs text-gray-400 font-medium">
            Már van fiókod? 
            <a routerLink="/login" class="text-black! font-black hover:text-pastel-pink transition-colors ml-1 uppercase tracking-tighter">Bejelentkezés</a>
          </p>
        </div>
      </form>
    </div>
  </mat-card>
</div>
