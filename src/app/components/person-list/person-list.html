<div class="space-y-8">
  <!-- Fejléc és Keresés -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-8 border border-black/5 shadow-sm gap-6 rounded-[4px]">
    <div>
      <h1 class="text-3xl font-black text-black! tracking-tighter uppercase">Személyek</h1>
      <p class="text-gray-400 text-sm font-medium">Gondozók és örökbefogadók adatai</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
      <div class="relative w-full sm:w-64">
        <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 scale-75">search</mat-icon>
        <input 
          (keyup)="applyFilter($event)" 
          class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-100 text-sm focus:outline-none focus:ring-1 focus:ring-black transition-all font-medium rounded-[4px]"
          placeholder="Keresés..."
        >
      </div>
      <button mat-flat-button 
        (click)="openAddPersonDialog()"
        class="p-6! bg-black! text-white! hover:bg-pastel-pink! hover:text-black! rounded-[4px]!">
        <mat-icon class="mr-1">person_add</mat-icon>
        Új személy
      </button>
    </div>
  </div>

  <!-- Táblázat konténer -->
  <div class="bg-white border border-black/10 overflow-hidden shadow-none rounded-[4px]!">
    <table mat-table [dataSource]="dataSource" matSort class="w-full">

      <!-- Név oszlop -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-black! font-black py-6 uppercase text-[11px] tracking-widest bg-gray-50/50">Név</th>
        <td mat-cell *matCellDef="let person" class="py-6">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-pastel-pink! flex items-center justify-center text-black! font-black text-xs rounded-[4px]!">
              {{ person.name.charAt(0) }}
            </div>
            <span class="font-bold text-black!">{{ person.name }}</span>
          </div>
        </td>
      </ng-container>

      <!-- Státusz oszlop -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-black! font-black py-6 uppercase text-[11px] tracking-widest bg-gray-50/50">Státusz</th>
        <td mat-cell *matCellDef="let person">
          <span class="px-4 py-2 text-[10px] font-black uppercase tracking-[0.15em] border border-black/5 rounded-[4px]!" 
            [ngClass]="{
              'bg-black! text-white!': person.status === 'gondozó',
              'bg-pastel-pink! text-black!': person.status === 'végleges',
              'bg-white! text-black! border-black!': person.status === 'ideiglenes',
              'bg-gray-100! text-gray-500!': person.status === 'érdeklődő'
            }">
            {{ person.status }}
          </span>
        </td>
      </ng-container>

      <!-- Telefon oszlop -->
      <ng-container matColumnDef="phoneNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-black! font-black py-6 uppercase text-[11px] tracking-widest bg-gray-50/50">Telefonszám</th>
        <td mat-cell *matCellDef="let person" class="text-black! font-medium">{{ person.phoneNumber }}</td>
      </ng-container>

      <!-- Lakhely oszlop -->
      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-black! font-black py-6 uppercase text-[11px] tracking-widest bg-gray-50/50">Lakhely</th>
        <td mat-cell *matCellDef="let person" class="text-gray-500 font-medium max-w-xs truncate">{{ person.address }}</td>
      </ng-container>

      <!-- Műveletek oszlop -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-black! font-black py-6 uppercase text-[11px] tracking-widest bg-gray-50/50 text-right pr-12">Műveletek</th>
        <td mat-cell *matCellDef="let person" class="text-right pr-8">
          <button mat-icon-button (click)="openEditPersonDialog(person)" class="text-black! hover:bg-pastel-pink! transition-colors rounded-[4px]! mr-2" matTooltip="Szerkesztés">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deletePerson(person._id)" class="text-red-500 hover:bg-black! hover:text-white! transition-colors rounded-[4px]!" matTooltip="Törlés">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="border-b border-gray-50 hover:bg-gray-50/30 transition-colors"></tr>
    </table>
  </div>
</div>
